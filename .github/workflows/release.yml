name: Release Agent

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Enable corepack
        run: corepack enable

      - name: Build embedded assets
        run: ./scripts/build_assets.sh

      - name: Collect knowledge bundle assets
        run: |
          set -euo pipefail
          mkdir -p dist
          cp internal/knowledge/dist/knowledge_bundle.manifest.json dist/
          cp internal/knowledge/dist/knowledge_bundle.sha256 dist/

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA::12}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.BuildTime=${BUILD_TIME}" \
            -o dist/redeven \
            ./cmd/redeven

          tar -C dist -czf "dist/redeven_${GOOS}_${GOARCH}.tar.gz" redeven
          rm -f dist/redeven

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: package-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/redeven_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
            dist/knowledge_bundle.manifest.json
            dist/knowledge_bundle.sha256
          if-no-files-found: error

  desktop:
    name: Desktop ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-24.04
            builder_platform: linux
            builder_target: AppImage
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            builder_platform: linux
            builder_target: AppImage
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
            builder_platform: mac
            builder_target: dmg
          - goos: darwin
            goarch: arm64
            runner: macos-15
            builder_platform: mac
            builder_target: dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Download matching agent package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist/agent
          gh run download "${GITHUB_RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir dist/agent \
            --name "package-${{ matrix.goos }}-${{ matrix.goarch }}"

      - name: Prepare bundled agent binary
        run: |
          set -euo pipefail
          bundle_dir="desktop/.bundle/${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "${bundle_dir}"
          tar -xzf "dist/agent/redeven_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" -C "${bundle_dir}"
          chmod +x "${bundle_dir}/redeven"

      - name: Desktop quality checks
        run: ./scripts/check_desktop.sh

      - name: Build desktop package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          REDEVEN_DESKTOP_AGENT_BINARY: ${{ github.workspace }}/desktop/.bundle/${{ matrix.goos }}-${{ matrix.goarch }}/redeven
          REDEVEN_DESKTOP_VERSION: ${{ github.ref_name }}
          REDEVEN_DESKTOP_MAC_IDENTITY: "-"
        run: |
          set -euo pipefail
          cd desktop
          version="${REDEVEN_DESKTOP_VERSION#v}"
          REDEVEN_DESKTOP_VERSION="${version}" \
          npm run package -- --${{ matrix.builder_platform }} ${{ matrix.builder_target }}

      - name: Upload desktop package artifact
        uses: actions/upload-artifact@v6
        with:
          name: desktop-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            desktop/release/*.AppImage
            desktop/release/*.dmg
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs:
      - build
      - desktop
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all package artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist/downloads
          gh run download "${GITHUB_RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir dist/downloads \
            --pattern "package-*"

      - name: Download all desktop artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist/downloads
          gh run download "${GITHUB_RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir dist/downloads \
            --pattern "desktop-*"

      - name: Collect release assets
        run: |
          set -euo pipefail
          find dist/downloads -type f -name 'redeven_*.tar.gz' -exec cp {} dist/ \;
          find dist/downloads -type f \( -name '*.AppImage' -o -name '*.dmg' \) -exec cp {} dist/ \;

          manifest_src="$(find dist/downloads -type f -name 'knowledge_bundle.manifest.json' -print -quit)"
          checksum_src="$(find dist/downloads -type f -name 'knowledge_bundle.sha256' -print -quit)"

          test -n "${manifest_src}"
          test -n "${checksum_src}"

          cp "${manifest_src}" dist/knowledge_bundle.manifest.json
          cp "${checksum_src}" dist/knowledge_bundle.sha256

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum redeven_*.tar.gz Redeven-Desktop-* knowledge_bundle.manifest.json knowledge_bundle.sha256 > SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums with keyless OIDC
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --output-signature dist/SHA256SUMS.sig \
            --output-certificate dist/SHA256SUMS.pem \
            dist/SHA256SUMS

      - name: Generate release notes preface
        run: ./scripts/generate_release_notes.sh "${GITHUB_REF_NAME}" dist/RELEASE_NOTES.md

      - name: Generate GitHub release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${GITHUB_REF_NAME}" > dist/GITHUB_RELEASE_NOTES.json

          jq -r '.name' dist/GITHUB_RELEASE_NOTES.json > dist/RELEASE_TITLE.txt
          jq -r '.body' dist/GITHUB_RELEASE_NOTES.json > dist/RELEASE_NOTES_AUTO.md

          {
            cat dist/RELEASE_NOTES.md
            printf '\n\n'
            cat dist/RELEASE_NOTES_AUTO.md
          } > dist/RELEASE_NOTES_FULL.md

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          title="$(cat dist/RELEASE_TITLE.txt)"
          release_flags=()
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+- ]]; then
            release_flags+=(--prerelease)
          fi

          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${title}" \
              --notes-file dist/RELEASE_NOTES_FULL.md \
              "${release_flags[@]}"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --title "${title}" \
              --notes-file dist/RELEASE_NOTES_FULL.md \
              "${release_flags[@]}"
          fi

          gh release upload "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber \
            dist/redeven_*.tar.gz \
            dist/Redeven-Desktop-* \
            dist/SHA256SUMS \
            dist/SHA256SUMS.sig \
            dist/SHA256SUMS.pem \
            dist/knowledge_bundle.manifest.json \
            dist/knowledge_bundle.sha256
