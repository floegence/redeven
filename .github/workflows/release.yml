name: Release Redeven

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  renderer-e2e:
    name: Built Env App and terminal carrier E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Enable corepack
        run: corepack enable

      - name: Build embedded assets
        run: ./scripts/build_assets.sh

      - name: Install Chromium
        working-directory: internal/envapp/ui_src
        run: corepack pnpm exec playwright install --with-deps chromium

      - name: Verify built Env App shell
        working-directory: internal/envapp/ui_src
        run: corepack pnpm run test:built-dist-shell -- --report "${RUNNER_TEMP}/redeven-built-dist-shell-smoke.json"

      - name: Verify 64 KiB terminal recovery carrier
        working-directory: internal/envapp/ui_src
        run: xvfb-run -a corepack pnpm run test:terminal-carrier -- --fixture-bytes 65536 --report "${RUNNER_TEMP}/redeven-terminal-carrier-64KiB.json"

      - name: Verify 448 KiB terminal recovery carrier
        working-directory: internal/envapp/ui_src
        run: xvfb-run -a corepack pnpm run test:terminal-carrier -- --fixture-bytes 458752 --report "${RUNNER_TEMP}/redeven-terminal-carrier-448KiB.json"

      - name: Verify terminal history fixture matrix
        env:
          REDEVEN_TERMINAL_HISTORY_REPORT: ${{ runner.temp }}/redeven-terminal-history-fixtures.json
        run: GOWORK=off go test ./internal/terminal -run TestTerminalHistoryDeterministicFixtureMatrix -count=1

      - name: Upload renderer E2E reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-renderer-e2e-reports
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/redeven-built-dist-shell-smoke.json
            ${{ runner.temp }}/redeven-terminal-carrier-*.json
            ${{ runner.temp }}/redeven-terminal-history-fixtures.json

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: renderer-e2e
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Enable corepack
        run: corepack enable

      - name: Validate runtime compatibility contract
        run: ./scripts/check_runtime_compatibility_contract.sh "${GITHUB_REF_NAME}"

      - name: Validate Gateway protocol contract
        run: ./scripts/check_gateway_protocol_contract.sh

      - name: Build embedded assets
        run: ./scripts/build_assets.sh

      - name: Collect OKF bundle assets
        run: |
          set -euo pipefail
          mkdir -p dist
          cp okf/dist/okf_bundle.manifest.json dist/
          cp okf/dist/okf_bundle.sha256 dist/
          cp LICENSE dist/LICENSE
          cp THIRD_PARTY_NOTICES.md dist/THIRD_PARTY_NOTICES.md

      - name: Build binary
        env:
          GH_TOKEN: ${{ github.token }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          REDEVEN_RELEASE_REDEVPLUGIN_VERSION: ${{ vars.REDEVEN_RELEASE_REDEVPLUGIN_VERSION }}
          REDEVEN_RELEASE_REDEVPLUGIN_REPO: ${{ vars.REDEVEN_RELEASE_REDEVPLUGIN_REPO }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA::12}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.BuildTime=${BUILD_TIME}" \
            -o dist/redeven \
            ./cmd/redeven
          go build \
            -trimpath \
            -ldflags "-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.BuildTime=${BUILD_TIME}" \
            -o dist/redeven-gateway \
            ./cmd/redeven-gateway

          if [ -n "${REDEVEN_RELEASE_REDEVPLUGIN_VERSION:-}" ]; then
            args=(
              --version "$REDEVEN_RELEASE_REDEVPLUGIN_VERSION"
              --dest-dir "dist/redevplugin-release"
              --redeven-goos "$GOOS"
              --redeven-goarch "$GOARCH"
              --runtime-out "dist/redevplugin-runtime"
            )
            if [ -n "${REDEVEN_RELEASE_REDEVPLUGIN_REPO:-}" ]; then
              args+=(--repo "$REDEVEN_RELEASE_REDEVPLUGIN_REPO")
            fi
            ./scripts/stage_redevplugin_release_artifacts.sh "${args[@]}"
          fi

          redeven_entries=(redeven LICENSE THIRD_PARTY_NOTICES.md)
          if [ -f dist/redevplugin-runtime ]; then
            redeven_entries+=(redevplugin-runtime REDEVPLUGIN_THIRD_PARTY_NOTICES.md .redevplugin-release-artifacts-verified.json)
          fi
          (
            cd dist
            tar -czf "redeven_${GOOS}_${GOARCH}.tar.gz" "${redeven_entries[@]}"
          )
          tar -C dist -czf "dist/redeven-gateway_${GOOS}_${GOARCH}.tar.gz" redeven-gateway LICENSE THIRD_PARTY_NOTICES.md
          rm -f dist/redeven dist/redeven-gateway dist/redevplugin-runtime dist/REDEVPLUGIN_THIRD_PARTY_NOTICES.md

          upload_dir="dist/package-${GOOS}-${GOARCH}"
          mkdir -p "$upload_dir"
          cp "dist/redeven_${GOOS}_${GOARCH}.tar.gz" "$upload_dir/"
          cp "dist/redeven-gateway_${GOOS}_${GOARCH}.tar.gz" "$upload_dir/"
          cp dist/okf_bundle.manifest.json "$upload_dir/"
          cp dist/okf_bundle.sha256 "$upload_dir/"
          cp dist/LICENSE "$upload_dir/"
          cp dist/THIRD_PARTY_NOTICES.md "$upload_dir/"
          if [ -f dist/.redevplugin-release-artifacts-verified.json ]; then
            cp dist/.redevplugin-release-artifacts-verified.json "$upload_dir/"
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: package-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/package-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error
          include-hidden-files: true

  desktop:
    name: Desktop ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-24.04
            builder_args: --linux
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            builder_args: --linux
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
            builder_args: --mac dmg
          - goos: darwin
            goarch: arm64
            runner: macos-15
            builder_args: --mac dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Download matching runtime package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist/agent
          gh run download "${GITHUB_RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir dist/agent \
            --name "package-${{ matrix.goos }}-${{ matrix.goarch }}"

      - name: Desktop lightweight checks
        run: ./scripts/check_desktop.sh --ci

      - name: Validate macOS signing inputs
        if: matrix.goos == 'darwin'
        env:
          REDEVEN_DESKTOP_MAC_CERT_BASE64: ${{ secrets.REDEVEN_DESKTOP_MAC_CERT_BASE64 }}
          REDEVEN_DESKTOP_MAC_CERT_PASSWORD: ${{ secrets.REDEVEN_DESKTOP_MAC_CERT_PASSWORD }}
          REDEVEN_DESKTOP_MAC_IDENTITY: ${{ secrets.REDEVEN_DESKTOP_MAC_IDENTITY }}
          REDEVEN_DESKTOP_MAC_NOTARY_API_KEY: ${{ secrets.REDEVEN_DESKTOP_MAC_NOTARY_API_KEY }}
          REDEVEN_DESKTOP_MAC_NOTARY_API_KEY_ID: ${{ secrets.REDEVEN_DESKTOP_MAC_NOTARY_API_KEY_ID }}
          REDEVEN_DESKTOP_MAC_NOTARY_API_ISSUER: ${{ secrets.REDEVEN_DESKTOP_MAC_NOTARY_API_ISSUER }}
        run: |
          set -euo pipefail
          missing=()
          for name in \
            REDEVEN_DESKTOP_MAC_CERT_BASE64 \
            REDEVEN_DESKTOP_MAC_CERT_PASSWORD \
            REDEVEN_DESKTOP_MAC_IDENTITY \
            REDEVEN_DESKTOP_MAC_NOTARY_API_KEY \
            REDEVEN_DESKTOP_MAC_NOTARY_API_KEY_ID \
            REDEVEN_DESKTOP_MAC_NOTARY_API_ISSUER; do
            if [ -z "${!name:-}" ]; then
              missing+=("${name}")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            printf 'Missing required macOS release secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Prepare Apple notarization key
        if: matrix.goos == 'darwin'
        env:
          REDEVEN_DESKTOP_MAC_NOTARY_API_KEY: ${{ secrets.REDEVEN_DESKTOP_MAC_NOTARY_API_KEY }}
          REDEVEN_DESKTOP_MAC_NOTARY_API_KEY_ID: ${{ secrets.REDEVEN_DESKTOP_MAC_NOTARY_API_KEY_ID }}
        run: |
          set -euo pipefail
          key_dir="${RUNNER_TEMP}/redeven-notary"
          mkdir -p "${key_dir}"
          key_path="${key_dir}/AuthKey_${REDEVEN_DESKTOP_MAC_NOTARY_API_KEY_ID}.p8"
          printf '%s' "${REDEVEN_DESKTOP_MAC_NOTARY_API_KEY}" > "${key_path}"
          chmod 600 "${key_path}"
          printf 'REDEVEN_DESKTOP_MAC_NOTARY_KEY_PATH=%s\n' "${key_path}" >> "${GITHUB_ENV}"

      - name: Build desktop package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CSC_LINK: ${{ secrets.REDEVEN_DESKTOP_MAC_CERT_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.REDEVEN_DESKTOP_MAC_CERT_PASSWORD }}
          REDEVEN_DESKTOP_MAC_IDENTITY: ${{ secrets.REDEVEN_DESKTOP_MAC_IDENTITY }}
          APPLE_API_KEY_ID: ${{ secrets.REDEVEN_DESKTOP_MAC_NOTARY_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.REDEVEN_DESKTOP_MAC_NOTARY_API_ISSUER }}
          REDEVEN_DESKTOP_BUNDLE_GOOS: ${{ matrix.goos }}
          REDEVEN_DESKTOP_BUNDLE_GOARCH: ${{ matrix.goarch }}
          REDEVEN_DESKTOP_RUNTIME_TARBALL: ${{ github.workspace }}/dist/agent/redeven_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
          REDEVEN_DESKTOP_GATEWAY_TARBALL: ${{ github.workspace }}/dist/agent/redeven-gateway_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
          REDEVEN_DESKTOP_VERSION: ${{ github.ref_name }}
          REDEVEN_DESKTOP_REDEVPLUGIN_VERSION: ${{ vars.REDEVEN_RELEASE_REDEVPLUGIN_VERSION }}
          REDEVEN_DESKTOP_REDEVPLUGIN_REPO: ${{ vars.REDEVEN_RELEASE_REDEVPLUGIN_REPO }}
        run: |
          set -euo pipefail
          cd desktop
          version="${REDEVEN_DESKTOP_VERSION#v}"
          mac_identity="${REDEVEN_DESKTOP_MAC_IDENTITY:-}"
          apple_api_key="${REDEVEN_DESKTOP_MAC_NOTARY_KEY_PATH:-}"
          apple_api_key_id="${APPLE_API_KEY_ID:-}"
          apple_api_issuer="${APPLE_API_ISSUER:-}"
          if [ "${{ matrix.goos }}" != "darwin" ]; then
            mac_identity="-"
            apple_api_key=""
            apple_api_key_id=""
            apple_api_issuer=""
          fi
          REDEVEN_DESKTOP_VERSION="${version}" \
          REDEVEN_DESKTOP_MAC_IDENTITY="${mac_identity:--}" \
          APPLE_API_KEY="${apple_api_key}" \
          APPLE_API_KEY_ID="${apple_api_key_id}" \
          APPLE_API_ISSUER="${apple_api_issuer}" \
          npm run package -- ${{ matrix.builder_args }}

      - name: Upload desktop package artifact
        uses: actions/upload-artifact@v6
        with:
          name: desktop-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            desktop/release/*.deb
            desktop/release/*.rpm
            desktop/release/*.dmg
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs:
      - build
      - desktop
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all package artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist/downloads
          gh run download "${GITHUB_RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir dist/downloads \
            --pattern "package-*"

      - name: Download all desktop artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist/downloads
          gh run download "${GITHUB_RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir dist/downloads \
            --pattern "desktop-*"

      - name: Collect release assets
        run: |
          set -euo pipefail
          find dist/downloads -type f -name 'redeven_*.tar.gz' -exec cp {} dist/ \;
          find dist/downloads -type f -name 'redeven-gateway_*.tar.gz' -exec cp {} dist/ \;
          find dist/downloads -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.dmg' \) -exec cp {} dist/ \;
          find dist/downloads -type f -name '.redevplugin-release-artifacts-verified.json' -exec cp {} dist/ \;

          manifest_src="$(find dist/downloads -type f -name 'okf_bundle.manifest.json' -print -quit)"
          checksum_src="$(find dist/downloads -type f -name 'okf_bundle.sha256' -print -quit)"

          test -n "${manifest_src}"
          test -n "${checksum_src}"

          cp "${manifest_src}" dist/okf_bundle.manifest.json
          cp "${checksum_src}" dist/okf_bundle.sha256
          cp LICENSE dist/LICENSE
          cp THIRD_PARTY_NOTICES.md dist/THIRD_PARTY_NOTICES.md

      - name: Validate ReDevPlugin consumption gate
        run: ./scripts/check_redevplugin_consumption_gate.sh --scan-root dist

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum redeven_*.tar.gz redeven-gateway_*.tar.gz Redeven-Desktop-* LICENSE THIRD_PARTY_NOTICES.md okf_bundle.manifest.json okf_bundle.sha256 > SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums with keyless OIDC
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --output-signature dist/SHA256SUMS.sig \
            --output-certificate dist/SHA256SUMS.pem \
            dist/SHA256SUMS

      - name: Generate release notes preface
        run: ./scripts/generate_release_notes.sh "${GITHUB_REF_NAME}" dist/RELEASE_NOTES.md

      - name: Validate release notes highlights
        run: |
          set -euo pipefail
          awk '
            /^## Release Highlights$/ { in_section = 1; next }
            /^## / && in_section { exit(found ? 0 : 1) }
            in_section && /^- / { found = 1 }
            END { exit(found ? 0 : 1) }
          ' dist/RELEASE_NOTES.md

      - name: Generate GitHub release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${GITHUB_REF_NAME}" > dist/GITHUB_RELEASE_NOTES.json

          jq -r '.name' dist/GITHUB_RELEASE_NOTES.json > dist/RELEASE_TITLE.txt
          jq -r '.body' dist/GITHUB_RELEASE_NOTES.json > dist/RELEASE_NOTES_AUTO.md

          {
            cat dist/RELEASE_NOTES.md
            printf '\n\n'
            cat dist/RELEASE_NOTES_AUTO.md
          } > dist/RELEASE_NOTES_FULL.md

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          title="$(cat dist/RELEASE_TITLE.txt)"
          release_flags=()
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+- ]]; then
            release_flags+=(--prerelease)
          fi

          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${title}" \
              --notes-file dist/RELEASE_NOTES_FULL.md \
              "${release_flags[@]}"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --title "${title}" \
              --notes-file dist/RELEASE_NOTES_FULL.md \
              "${release_flags[@]}"
          fi

          gh release upload "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber \
            dist/redeven_*.tar.gz \
            dist/redeven-gateway_*.tar.gz \
            dist/Redeven-Desktop-* \
            dist/SHA256SUMS \
            dist/SHA256SUMS.sig \
            dist/SHA256SUMS.pem \
            dist/LICENSE \
            dist/THIRD_PARTY_NOTICES.md \
            dist/okf_bundle.manifest.json \
            dist/okf_bundle.sha256
